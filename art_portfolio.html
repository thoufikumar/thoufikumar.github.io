<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Portfolio - Take it to the Creative level</title>
    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="art_portfolio.css">
</head>

<body>

    <header class="art-gallery-hero">
        <div class="hero-container">
            <button class="back-button" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                BACK
            </button>
            <h1 class="gallery-title">STANDARD GALLERY</h1>
        </div>
    </header>


    <main class="gallery-grid" id="galleryGrid">
        <!-- Cards will be populated and categories assigned via JS -->
        <div class="gallery-card" data-category="approved" data-id="2392">
            <div class="card-inner">
                <img src="assets/art_assets/1.jpeg" alt="Artwork 1">
            </div>
        </div>
        <div class="gallery-card" data-category="rejected" data-id="2393">
            <div class="card-inner">
                <img src="assets/art_assets/2.jpeg" alt="Artwork 2">
            </div>
        </div>
        <div class="gallery-card" data-category="approved" data-id="2394">
            <div class="card-inner">
                <img src="assets/art_assets/3.jpeg" alt="Artwork 3">
            </div>
        </div>
        <div class="gallery-card" data-category="approved" data-id="2395">
            <div class="card-inner">
                <img src="assets/art_assets/4.jpeg" alt="Artwork 4">
            </div>
        </div>
        <div class="gallery-card" data-category="rejected" data-id="2396">
            <div class="card-inner">
                <img src="assets/art_assets/5.jpeg" alt="Artwork 5">
            </div>
        </div>
        <div class="gallery-card" data-category="approved" data-id="2397">
            <div class="card-inner">
                <img src="assets/art_assets/6.jpeg" alt="Artwork 6">
            </div>
        </div>
        <div class="gallery-card" data-category="approved" data-id="2398">
            <div class="card-inner">
                <img src="assets/art_assets/7.jpeg" alt="Artwork 7">
            </div>
        </div>
        <div class="gallery-card" data-category="approved" data-id="2399">
            <div class="card-inner">
                <img src="assets/art_assets/8.jpeg" alt="Artwork 8">
            </div>
        </div>
    </main>

    <footer class="footer-section">
        <div class="footer-container">
            <div class="footer-bottom">
                <p class="copyright">&copy; 2026 Art Portfolio. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>
    <script src="art_portfolio.js"></script>
</body>

</html>
