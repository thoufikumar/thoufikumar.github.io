<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Portfolio | Creative Gallery</title>
    <link rel="stylesheet" href="art-portfolio.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-container">
        <!-- Hero Section -->
        <header class="art-hero">
            <button class="back-button" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                BACK
            </button>
            <h1 class="hero-title">STANDARD GALLERY</h1>
        </header>

        <!-- Gallery Grid -->
        <main class="gallery-grid">
            <!-- Featured Card -->
            <div class="gallery-card featured">
                <img src="../assets/art_assets/1.jpeg" alt="Artwork 1">
            </div>

            <div class="gallery-card">
                <img src="../assets/art_assets/2.jpeg" alt="Artwork 2">
            </div>

            <div class="gallery-card">
                <img src="../assets/art_assets/3.jpeg" alt="Artwork 3">
            </div>

            <div class="gallery-card featured">
                <img src="../assets/art_assets/4.jpeg" alt="Artwork 4">
            </div>

            <div class="gallery-card">
                <img src="../assets/art_assets/5.jpeg" alt="Artwork 5">
            </div>

            <div class="gallery-card">
                <img src="../assets/art_assets/6.jpeg" alt="Artwork 6">
            </div>

            <div class="gallery-card">
                <img src="../assets/art_assets/7.jpeg" alt="Artwork 7">
            </div>

            <div class="gallery-card">
                <img src="../assets/art_assets/8.jpeg" alt="Artwork 8">
            </div>
        </main>

        <!-- Footer -->
        <footer class="gallery-footer">
            <p>&copy; 2026 Art Portfolio</p>
            <p>Curated for mobile experience</p>
        </footer>
    </div>
</body>

</html>
